services:
    mongodb:
        image: mongo:latest
        ports:
            - "27017:27017"
        volumes:
            - mongodb_data:/data/db
            - ./mongodb-init:/docker-entrypoint-initdb.d
        environment:
            - MONGO_INITDB_ROOT_USERNAME=root
            - MONGO_INITDB_ROOT_PASSWORD=example
        restart: always
        command: [ "--bind_ip", "0.0.0.0" ]

    chromadb:
        image: chromadb/chroma:latest
        ports:
            - "8000:8000"
        volumes:
            - chromadb_data:/chroma/data
        environment:
            - CHROMA_SERVER_HOST=0.0.0.0
            - CHROMA_SERVER_HTTP_PORT=8000
            - CHROMA_PERSIST_DIRECTORY=/chroma/data
        restart: always

    nginx:
        build: ./nginx
        ports:
            - "80:80"
        depends_on:
            - frontend
            - backend
            - llm-backend
        restart: always

    backend:
        build: ./backend
        expose:
            - "5000"
        depends_on:
            - mongodb
        environment:
            - MONGO_URI=mongodb://root:example@mongodb:27017/
            - PORT=5000
        restart: always

    llm-backend:
        build: ./llm-backend
        expose:
            - "5000"
        depends_on:
            - mongodb
            - chromadb
        environment:
            - MONGO_URI=mongodb://root:example@mongodb:27017/
            - PORT=5000
            - PYTHONUNBUFFERED=1
            - GROQ_API_KEY=${GROQ_API_KEY}
            - CHROMA_SERVER_HOST=chromadb
            - CHROMA_SERVER_PORT=8000
        restart: always

    frontend:
        build: ./frontend
        expose:
            - "3000"
        environment:
            - WATCHPACK_POLLING=true
            - WDS_SOCKET_PORT=0
            - NEXT_PUBLIC_API_URL=/api
            - NEXT_PUBLIC_LLM_API_URL=/llm-api
        volumes:
            - ./frontend:/app
            - /app/node_modules
            - /app/.next
        depends_on:
            - backend
            - llm-backend
        restart: always
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    mongodb_data:
        driver: local
    chromadb_data:
        driver: local
